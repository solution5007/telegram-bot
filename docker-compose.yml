services:


  bot:
    build: .
    container_name: vpn-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/data        # SQLite хранится в named volume
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
